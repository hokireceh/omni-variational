# ============================================================
# Apache Virtual Host — Variational Grid Bot
# Untuk aaPanel dengan Apache 2.4
#
# Letakkan file ini di:
#   /www/server/panel/vhost/apache/yourdomain.conf
# atau paste isi ini ke pengaturan situs di aaPanel
# ============================================================

<VirtualHost *:80>
    ServerName yourdomain.com
    # Ganti yourdomain.com dengan domain/IP kamu

    # ── Frontend (React build) ──────────────────────────────
    DocumentRoot /www/wwwroot/grid-bot/frontend
    <Directory /www/wwwroot/grid-bot/frontend>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # SPA fallback: semua request → index.html
        FallbackResource /index.html
    </Directory>

    # ── API Proxy ke Node.js (port 8080) ───────────────────
    ProxyPreserveHost On
    ProxyRequests Off

    <Location /api>
        ProxyPass        http://127.0.0.1:8080/api
        ProxyPassReverse http://127.0.0.1:8080/api
    </Location>

    # ── Log ────────────────────────────────────────────────
    ErrorLog  /www/wwwlogs/grid-bot.error.log
    CustomLog /www/wwwlogs/grid-bot.access.log combined
</VirtualHost>

# Untuk HTTPS (aaPanel bisa auto-generate SSL via Let's Encrypt):
# <VirtualHost *:443>
#     ServerName yourdomain.com
#     DocumentRoot /www/wwwroot/grid-bot/frontend
#     SSLEngine on
#     SSLCertificateFile    /etc/letsencrypt/live/yourdomain.com/fullchain.pem
#     SSLCertificateKeyFile /etc/letsencrypt/live/yourdomain.com/privkey.pem
#     ... (sama seperti di atas)
# </VirtualHost>
