kind = "web"
previewPath = "/"
title = "Grid Bot Panel"
version = "1.0.0"
id = "artifacts/grid-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25979
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/grid-panel run dev"

[services.env]
PORT = "25979"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/grid-panel", "run", "build"]
publicDir = "artifacts/grid-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
